<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="cabecalho">
            <h1 class="titulo">Gerador de senhas</h1>
            <p class="descricao">Gere instantaneamente uma senha aleatória e segura</p>
        </header>

        <section class="caixa-senha">
            <span class="senha-gerada">zcBLsNGXabce</span>
            <img src="unlock.svg" alt="Ícone de cadeado aberto" class="icone-cadeado">
        </section>

        <section class="personalizar">
            <h2 class="subtitulo">Personalize sua senha</h2>
            
            <div class="parametro-senha">
                <p class="parametro-senha__label">Número de caracteres</p>
                <div class="parametro-senha__controle">
                    <button class="parametro-senha__botao">-</button>
                    <p class="parametro-senha__texto">12</p>
                    <button class="parametro-senha__botao">+</button>
                </div>
            </div>

            <div class="opcoes-e-forca">
                <div class="checkboxes">
                    <label class="opcao"><input type="checkbox" checked> Letras maiúsculas</label>
                    <label class="opcao"><input type="checkbox" checked> Letras minúsculas</label>
                    <label class="opcao"><input type="checkbox"> Números</label>
                    <label class="opcao"><input type="checkbox"> Símbolos</label>
                </div>

                <div class="forca-senha">
                    <p>Força da senha: <span class="status-fraca">Fraca</span></p>
                    <div class="barra-forca barra-fraca"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
