<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
        <section class="gerador">
            <div class="gerador__cabecalho">
                <img src="unlock.svg" alt="Ícone de cadeado aberto" class="gerador__icone">
                <h1 class="gerador__titulo">Gerador de Senhas</h1>
            </div>

            <div class="campo-senha">
                <input type="text" id="senha-gerada" class="campo-senha__input" readonly value="S3nH4_StR0nG!">
            </div>

            <div class="configuracoes">
                <p class="configuracoes__titulo">Número de caracteres</p>
                <div class="parametro-senha">
                    <button class="parametro-senha__botao" id="botao-diminuir">-</button>
                    <p class="parametro-senha__texto" id="numero-caracteres">12</p>
                    <button class="parametro-senha__botao" id="botao-aumentar">+</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
