<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="conteudo">
            <div class="cabecalho">
                <img src="unlock.svg" alt="Ícone de cadeado aberto" class="cabecalho__imagem">
                <h1 class="cabecalho__titulo">Gerador de Senhas</h1>
            </div>

            <div class="campo-senha">
                <input type="text" id="senha-gerada" class="campo-senha__input" readonly value="S3NH4!_">
            </div>

            <div class="parametros">
                <h2 class="parametros__titulo">Força da senha</h2>
                
                <div class="parametro-senha">
                    <h3 class="parametro-senha__titulo">Número de caracteres</h3>
                    <div.parametro-senha-checkbox
                    <input name="maiusculo" type="checkbox">
                    <label for="maiusculo">letras maiúsculas</label>
                    <input name="minusculo" type="checkbox">
                    <label for="minusculo">letras minúculas</label>
                    <div class="parametro-senha__controle">
                        <button class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto">12</p>
                        <button class="parametro-senha__botao">+</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
